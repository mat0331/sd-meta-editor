<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0066cc">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <title>SD Meta Editor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg:       #1a1a1a;
            --surface:  #2d2d2d;
            --border:   #444;
            --accent:   #0066cc;
            --text:     #fff;
            --muted:    #aaa;
            --success:  #33aa55;
            --danger:   #cc3333;
            --pos-bg:   #152a15;
            --neg-bg:   #2a1515;
            --set-bg:   #15152a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ヘッダー */
        .header {
            background: var(--surface);
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .header h1 {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
        }

        /* コンテンツエリア */
        .content {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            max-width: 640px;
            margin: 0 auto;
        }

        /* ファイル選択エリア */
        .file-card {
            background: var(--surface);
            border: 2px dashed var(--border);
            border-radius: 14px;
            padding: 22px 16px;
            text-align: center;
            transition: border-color 0.2s;
        }
        .file-card.loaded {
            border-style: solid;
            border-color: var(--accent);
        }

        #fileInput { display: none; }

        .pick-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 14px 0;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.15s;
        }
        .pick-btn:active { opacity: 0.75; }

        .file-name {
            margin-top: 12px;
            font-size: 13px;
            color: var(--muted);
            word-break: break-all;
        }
        .file-name.ok { color: var(--success); font-weight: 600; }

        /* ヒント（ファイル未選択時） */
        .hint {
            text-align: center;
            color: var(--muted);
            font-size: 14px;
            line-height: 2;
            padding: 20px 0 8px;
        }

        /* 編集エリア */
        #editorArea {
            display: none;
            flex-direction: column;
            gap: 14px;
        }

        /* 各セクション */
        .section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
        }

        .section-head {
            padding: 10px 16px;
            font-size: 13px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border);
            letter-spacing: 0.03em;
        }
        .section-head.pos { background: var(--pos-bg); color: #7ecf7e; }
        .section-head.neg { background: var(--neg-bg); color: #cf7e7e; }
        .section-head.set { background: var(--set-bg); color: #7e9ecf; }

        textarea {
            width: 100%;
            background: transparent;
            color: var(--text);
            border: none;
            padding: 14px 16px;
            font-size: 14px;
            font-family: 'Menlo', 'Courier New', monospace;
            resize: vertical;
            line-height: 1.7;
            outline: none;
        }
        textarea::placeholder { color: var(--muted); }

        .char-count {
            padding: 2px 16px 8px;
            font-size: 11px;
            color: var(--muted);
            text-align: right;
        }

        /* 保存ボタン */
        .save-btn {
            background: var(--success);
            color: #fff;
            border: none;
            padding: 18px;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.15s;
            letter-spacing: 0.02em;
        }
        .save-btn:active { opacity: 0.8; }

        /* トースト通知 */
        .toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #333;
            color: #fff;
            padding: 12px 26px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
            z-index: 100;
            white-space: nowrap;
        }
        .toast.show  { transform: translateX(-50%) translateY(0); }
        .toast.ok    { background: var(--success); }
        .toast.err   { background: var(--danger); }
    </style>
</head>
<body>

<div class="header">
    <span style="font-size:22px">🖼</span>
    <h1>SD Meta Editor</h1>
</div>

<div class="content">

    <!-- ファイル選択 -->
    <div class="file-card" id="fileCard">
        <input type="file" id="fileInput" accept=".png">
        <button class="pick-btn" onclick="document.getElementById('fileInput').click()">
            📁 PNGファイルを選ぶ
        </button>
        <div class="file-name" id="fileName">ファイルを選択してください</div>
    </div>

    <!-- ファイル未選択ヒント -->
    <div class="hint" id="hint">
        PNGを選ぶとメタデータを編集できます<br>
        編集後、新しいPNGとしてダウンロード
    </div>

    <!-- 編集エリア（ファイル選択後に表示） -->
    <div id="editorArea">

        <!-- ポジティブ -->
        <div class="section">
            <div class="section-head pos">✅ ポジティブプロンプト</div>
            <textarea id="positive" rows="7"
                placeholder="ポジティブプロンプトを入力..."
                oninput="updateCount('positive','posCount')"></textarea>
            <div class="char-count" id="posCount">0 文字</div>
        </div>

        <!-- ネガティブ -->
        <div class="section">
            <div class="section-head neg">❌ ネガティブプロンプト</div>
            <textarea id="negative" rows="4"
                placeholder="ネガティブプロンプトを入力..."
                oninput="updateCount('negative','negCount')"></textarea>
            <div class="char-count" id="negCount">0 文字</div>
        </div>

        <!-- 生成設定 -->
        <div class="section">
            <div class="section-head set">⚙️ 生成設定</div>
            <textarea id="settings" rows="3"
                style="font-size:13px; color:#bbb;"
                placeholder="Steps: 20, Sampler: Euler a, CFG scale: 7, ..."></textarea>
        </div>

        <!-- 保存 -->
        <button class="save-btn" onclick="saveFile()">
            💾 保存してダウンロード
        </button>

    </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// 状態管理
// ============================================================
let originalBuffer = null;
let originalFilename = '';

// ============================================================
// CRC-32 テーブル生成
// ============================================================
const CRC_TABLE = (() => {
    const t = new Uint32Array(256);
    for (let i = 0; i < 256; i++) {
        let c = i;
        for (let j = 0; j < 8; j++) {
            c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
        }
        t[i] = c;
    }
    return t;
})();

/**
 * CRC-32 を計算する
 * @param {Uint8Array} data
 * @returns {number}
 */
function crc32(data) {
    let crc = 0xFFFFFFFF;
    for (let i = 0; i < data.length; i++) {
        crc = CRC_TABLE[(crc ^ data[i]) & 0xFF] ^ (crc >>> 8);
    }
    return (crc ^ 0xFFFFFFFF) >>> 0;
}

// ============================================================
// PNG パーサー
// ============================================================
const PNG_SIG = new Uint8Array([137, 80, 78, 71, 13, 10, 26, 10]);

/**
 * PNG バイト列をチャンクのリストに分解する
 * @param {ArrayBuffer} buffer
 * @returns {Array<{type:string, data:Uint8Array, storedCrc:number}>}
 */
function parsePNG(buffer) {
    const bytes = new Uint8Array(buffer);

    // シグネチャ検証
    for (let i = 0; i < 8; i++) {
        if (bytes[i] !== PNG_SIG[i]) throw new Error('有効なPNGファイルではありません');
    }

    const chunks = [];
    let offset = 8;
    while (offset < bytes.length) {
        const view  = new DataView(buffer, offset);
        const length = view.getUint32(0);
        const type   = String.fromCharCode(
            bytes[offset + 4], bytes[offset + 5],
            bytes[offset + 6], bytes[offset + 7]
        );
        const data      = bytes.slice(offset + 8, offset + 8 + length);
        const storedCrc = view.getUint32(4 + length);
        chunks.push({ type, data, storedCrc });
        offset += 12 + length;
        if (type === 'IEND') break;
    }
    return chunks;
}

/**
 * チャンクリストから "parameters" テキストを取り出す（tEXt / iTXt 両対応）
 * @param {Array} chunks
 * @returns {string}
 */
function readParameters(chunks) {
    for (const chunk of chunks) {
        if (chunk.type === 'tEXt') {
            const nullIdx = chunk.data.indexOf(0);
            if (nullIdx < 0) continue;
            const keyword = decodeBytes(chunk.data.slice(0, nullIdx));
            if (keyword === 'parameters') {
                return decodeBytes(chunk.data.slice(nullIdx + 1));
            }
        } else if (chunk.type === 'iTXt') {
            // フォーマット: keyword\0 comprFlag comprMethod lang\0 transKey\0 text(UTF-8)
            let i = 0;
            while (i < chunk.data.length && chunk.data[i] !== 0) i++;
            const keyword = decodeBytes(chunk.data.slice(0, i));
            if (keyword !== 'parameters') continue;
            i++;
            const comprFlag = chunk.data[i++];
            i++; // comprMethod
            while (i < chunk.data.length && chunk.data[i] !== 0) i++; i++; // lang
            while (i < chunk.data.length && chunk.data[i] !== 0) i++; i++; // transKey
            if (comprFlag === 0) {
                return new TextDecoder('utf-8').decode(chunk.data.slice(i));
            }
        }
    }
    return '';
}

/**
 * バイト列を文字列にデコードする（UTF-8 → latin1 フォールバック）
 * @param {Uint8Array} bytes
 * @returns {string}
 */
function decodeBytes(bytes) {
    try {
        return new TextDecoder('utf-8').decode(bytes);
    } catch {
        return new TextDecoder('latin1').decode(bytes);
    }
}

// ============================================================
// PNG ビルダー
// ============================================================

/**
 * チャンク (type + data) からバイト列を生成する（CRC 再計算）
 * @param {string} type 4文字
 * @param {Uint8Array} data
 * @returns {Uint8Array}
 */
function makeChunk(type, data) {
    const typeBytes = new Uint8Array([
        type.charCodeAt(0), type.charCodeAt(1),
        type.charCodeAt(2), type.charCodeAt(3)
    ]);
    const crcInput = new Uint8Array(4 + data.length);
    crcInput.set(typeBytes, 0);
    crcInput.set(data, 4);
    const crc = crc32(crcInput);

    const result = new Uint8Array(12 + data.length);
    const view = new DataView(result.buffer);
    view.setUint32(0, data.length);
    result.set(typeBytes, 4);
    result.set(data, 8);
    view.setUint32(8 + data.length, crc);
    return result;
}

/**
 * "parameters" テキストチャンクを生成する。
 * ASCII/latin1 の場合は tEXt、非 latin1 文字を含む場合は iTXt (UTF-8) で書く。
 * @param {string} text
 * @returns {Uint8Array}
 */
function makeParamsChunk(text) {
    const keyword = 'parameters';
    const keyBytes = new TextEncoder().encode(keyword);

    // latin1 範囲内かチェック
    let isLatin1 = true;
    for (let i = 0; i < text.length; i++) {
        if (text.charCodeAt(i) > 255) { isLatin1 = false; break; }
    }

    if (isLatin1) {
        // tEXt チャンク: keyword\0text (latin1)
        const textBytes = new Uint8Array(text.length);
        for (let i = 0; i < text.length; i++) textBytes[i] = text.charCodeAt(i) & 0xFF;
        const data = new Uint8Array(keyBytes.length + 1 + textBytes.length);
        data.set(keyBytes, 0);
        data[keyBytes.length] = 0;
        data.set(textBytes, keyBytes.length + 1);
        return makeChunk('tEXt', data);
    } else {
        // iTXt チャンク: keyword\0 0 0 \0 \0 text(UTF-8)
        const textBytes = new TextEncoder().encode(text);
        const data = new Uint8Array(keyBytes.length + 5 + textBytes.length);
        data.set(keyBytes, 0);
        // null / comprFlag=0 / comprMethod=0 / lang="" null / transKey="" null
        data[keyBytes.length]     = 0;
        data[keyBytes.length + 1] = 0;
        data[keyBytes.length + 2] = 0;
        data[keyBytes.length + 3] = 0;
        data[keyBytes.length + 4] = 0;
        data.set(textBytes, keyBytes.length + 5);
        return makeChunk('iTXt', data);
    }
}

/**
 * 元のチャンクをそのままバイト列にシリアライズする（CRC はコピー）
 * @param {{type:string, data:Uint8Array, storedCrc:number}} chunk
 * @returns {Uint8Array}
 */
function serializeChunk(chunk) {
    const typeBytes = new Uint8Array([
        chunk.type.charCodeAt(0), chunk.type.charCodeAt(1),
        chunk.type.charCodeAt(2), chunk.type.charCodeAt(3)
    ]);
    const result = new Uint8Array(12 + chunk.data.length);
    const view = new DataView(result.buffer);
    view.setUint32(0, chunk.data.length);
    result.set(typeBytes, 4);
    result.set(chunk.data, 8);
    view.setUint32(8 + chunk.data.length, chunk.storedCrc);
    return result;
}

/**
 * 複数の Uint8Array を連結する
 * @param {Uint8Array[]} arrays
 * @returns {Uint8Array}
 */
function concatArrays(arrays) {
    const total = arrays.reduce((s, a) => s + a.length, 0);
    const result = new Uint8Array(total);
    let offset = 0;
    for (const arr of arrays) { result.set(arr, offset); offset += arr.length; }
    return result;
}

/**
 * PNG を新しい parameters で再構築して返す
 * @param {ArrayBuffer} originalBuffer
 * @param {string} newRaw 新しい parameters テキスト
 * @returns {Uint8Array}
 */
function buildPNG(originalBuffer, newRaw) {
    const chunks = parsePNG(originalBuffer);
    const parts = [PNG_SIG];
    let paramsWritten = false;

    for (const chunk of chunks) {
        // 既存の parameters チャンクを置き換える
        if ((chunk.type === 'tEXt' || chunk.type === 'iTXt') && isParamsChunk(chunk)) {
            parts.push(makeParamsChunk(newRaw));
            paramsWritten = true;
            continue;
        }

        // IDAT の前に parameters がなければここで挿入する
        if (!paramsWritten && chunk.type === 'IDAT') {
            parts.push(makeParamsChunk(newRaw));
            paramsWritten = true;
        }

        parts.push(serializeChunk(chunk));
    }

    return concatArrays(parts);
}

/**
 * チャンクが "parameters" キーワードを持つか判定する
 * @param {{data:Uint8Array}} chunk
 * @returns {boolean}
 */
function isParamsChunk(chunk) {
    const nullIdx = chunk.data.indexOf(0);
    if (nullIdx < 0) return false;
    return decodeBytes(chunk.data.slice(0, nullIdx)) === 'parameters';
}

// ============================================================
// パラメータ文字列の解析・組み立て
// ============================================================

/**
 * SD の parameters テキストを positive / negative / settings に分解する
 * @param {string} raw
 * @returns {{positive:string, negative:string, settings:string}}
 */
function parseParams(raw) {
    let positive = '', negative = '', settings = '';
    if (!raw) return { positive, negative, settings };

    const negIdx = raw.indexOf('\nNegative prompt:');
    if (negIdx >= 0) {
        positive = raw.slice(0, negIdx).trim();
        const rest = raw.slice(negIdx + '\nNegative prompt:'.length);
        const stepsIdx = rest.search(/\nSteps:/);
        if (stepsIdx >= 0) {
            negative = rest.slice(0, stepsIdx).trim();
            settings = rest.slice(stepsIdx).trim();
        } else {
            negative = rest.trim();
        }
    } else {
        const stepsIdx = raw.search(/\nSteps:/);
        if (stepsIdx >= 0) {
            positive = raw.slice(0, stepsIdx).trim();
            settings = raw.slice(stepsIdx).trim();
        } else {
            positive = raw.trim();
        }
    }

    return { positive, negative, settings };
}

/**
 * positive / negative / settings を SD フォーマットの文字列に組み立てる
 * @param {string} positive
 * @param {string} negative
 * @param {string} settings
 * @returns {string}
 */
function buildParams(positive, negative, settings) {
    const parts = [positive.trim()];
    if (negative.trim()) parts.push('Negative prompt: ' + negative.trim());
    if (settings.trim()) parts.push(settings.trim());
    return parts.join('\n');
}

// ============================================================
// UI ロジック
// ============================================================

// ファイル選択ハンドラ
document.getElementById('fileInput').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    try {
        const buffer = await file.arrayBuffer();

        // PNG シグネチャ確認
        const head = new Uint8Array(buffer, 0, 8);
        if (!PNG_SIG.every((b, i) => b === head[i])) {
            showToast('PNGファイルを選択してください', 'err');
            return;
        }

        // パース & 表示
        originalBuffer   = buffer;
        originalFilename = file.name;

        const chunks = parsePNG(buffer);
        const raw    = readParameters(chunks);
        const { positive, negative, settings } = parseParams(raw);

        document.getElementById('positive').value = positive;
        document.getElementById('negative').value = negative;
        document.getElementById('settings').value = settings;
        updateCount('positive', 'posCount');
        updateCount('negative', 'negCount');

        // UI 切り替え
        document.getElementById('fileCard').classList.add('loaded');
        const nameEl = document.getElementById('fileName');
        nameEl.textContent  = file.name;
        nameEl.className    = 'file-name ok';
        document.getElementById('hint').style.display       = 'none';
        document.getElementById('editorArea').style.display = 'flex';

        showToast(raw ? '読み込み完了！' : 'メタデータなし', raw ? 'ok' : 'err');
    } catch (err) {
        showToast('読み込みエラー: ' + err.message, 'err');
        console.error(err);
    }
});

/**
 * 編集済み PNG をダウンロードする
 */
function saveFile() {
    if (!originalBuffer) return;

    const positive = document.getElementById('positive').value;
    const negative = document.getElementById('negative').value;
    const settings = document.getElementById('settings').value;

    try {
        const newRaw  = buildParams(positive, negative, settings);
        const newPNG  = buildPNG(originalBuffer, newRaw);
        const blob    = new Blob([newPNG], { type: 'image/png' });
        const newName = originalFilename.replace(/\.png$/i, '') + '_edited.png';

        const url = URL.createObjectURL(blob);
        const a   = document.createElement('a');
        a.href     = url;
        a.download = newName;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 1000);

        showToast('保存しました！', 'ok');
    } catch (err) {
        showToast('保存エラー: ' + err.message, 'err');
        console.error(err);
    }
}

/**
 * テキストエリアの文字数を更新する
 * @param {string} textareaId
 * @param {string} countId
 */
function updateCount(textareaId, countId) {
    const len = document.getElementById(textareaId).value.length;
    document.getElementById(countId).textContent = len.toLocaleString() + ' 文字';
}

// トースト通知
let toastTimer = null;
/**
 * トースト通知を表示する
 * @param {string} msg
 * @param {'ok'|'err'|''} type
 */
function showToast(msg, type = '') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className   = 'toast show' + (type ? ' ' + type : '');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// Service Worker 登録
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
            .catch((err) => console.warn('SW 登録失敗:', err));
    });
}
</script>

</body>
</html>
